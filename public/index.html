<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="google" content="notranslate">
  <title>Wine Cellar App</title>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <style>
    /* Minimal base styles that can't be handled by Material UI theme */
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #150A0C; /* Darker wine-colored background */
    }
    /* Boot placeholder shown until the app bundle mounts (replaced by React) */
    #boot-placeholder {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background-color: #150A0C;
      color: #E8C3C8;
    }
    .boot-spinner {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid rgba(232, 195, 200, 0.25);
      border-top-color: #FFD54F;
      animation: boot-spin 0.9s linear infinite;
    }
    @keyframes boot-spin { to { transform: rotate(360deg); } }
    .boot-label {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="boot-placeholder">
      <div class="boot-spinner"></div>
      <div class="boot-label">Wine Cellar</div>
    </div>
  </div>
  <script>
    // Boot diagnostics: record the load timeline + any errors to localStorage so
    // a white/stuck launch can be inspected later (window.dumpBootLog()).
    (function () {
      var KEY = 'wc-boot-log', start = Date.now();
      function load() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch (e) { return []; } }
      function save(a) { try { localStorage.setItem(KEY, JSON.stringify(a.slice(-50))); } catch (e) {} }
      function rec(ev, msg) {
        var e = { t: new Date().toISOString(), ms: Date.now() - start, ev: ev, msg: msg || '' };
        var a = load(); a.push(e); save(a);
        try { console.log('[boot]', ev, e.ms + 'ms', msg || ''); } catch (_) {}
      }
      window.dumpBootLog = function () { return load(); };
      window.clearBootLog = function () { try { localStorage.removeItem(KEY); } catch (e) {} };
      rec('boot', 'html parsed' + (navigator.onLine ? '' : ' (offline)'));
      window.addEventListener('error', function (ev) {
        rec('error', ((ev && ev.message) || 'error') +
          (ev && ev.filename ? (' @' + ev.filename + ':' + (ev.lineno || 0)) : ''));
      });
      window.addEventListener('unhandledrejection', function (ev) {
        var r = ev && ev.reason; rec('error', 'unhandledrejection: ' + ((r && r.message) || String(r)));
      });
      var app = document.getElementById('app');
      if (app && window.MutationObserver) {
        var obs = new MutationObserver(function () {
          if (!document.getElementById('boot-placeholder')) {
            rec('rendered', 'app mounted'); obs.disconnect();
            clearTimeout(t1); clearTimeout(t2);
          }
        });
        obs.observe(app, { childList: true });
        var t1 = setTimeout(function () {
          if (document.getElementById('boot-placeholder')) rec('waiting', 'not rendered after 8s');
        }, 8000);
        var t2 = setTimeout(function () {
          if (document.getElementById('boot-placeholder')) rec('stuck', 'not rendered after 20s');
        }, 20000);
      }
    })();
  </script>
  <script defer src="/js/main.js"></script>
</body>
</html>
